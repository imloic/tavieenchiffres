server {
    listen 80;
    server_name www.tavieenchiffres.com
                tavieenchiffres.fr www.tavieenchiffres.fr
                tavieenchiffres.fun www.tavieenchiffres.fun
                tavieenchiffres.org www.tavieenchiffres.org;

    return 301 https://tavieenchiffres.com$request_uri;
}

server {
    listen 80 default_server;
    server_name tavieenchiffres.com;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        font/woff2
        application/font-woff2;

    # Block hidden files and directories (.git, .env, etc.)
    location ~ /\. {
        return 404;
    }

    # Cache static assets (headers repeated: nginx ignores server-level add_header when location has its own)
    location ~* \.(woff2|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location = /index.html {
        expires 1h;
        add_header Cache-Control "public, no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
