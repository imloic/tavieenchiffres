server {
    listen 80;
    server_name www.tavieenchiffres.com
                tavieenchiffres.fr www.tavieenchiffres.fr
                tavieenchiffres.fun www.tavieenchiffres.fun
                tavieenchiffres.org www.tavieenchiffres.org;

    return 301 https://tavieenchiffres.com$request_uri;
}

server {
    listen 80 default_server;
    server_name tavieenchiffres.com;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        font/woff2
        application/font-woff2;

    # Cache static assets
    location ~* \.(woff2|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    location = /index.html {
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
